<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Software Development Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: false, theme: 'dark' });
      window.mermaid = mermaid;
    </script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.18);
        --text-color: rgba(240, 240, 240, 1);
        --text-color-darker: rgba(220, 220, 220, 0.8);
        --accent-color: #00f2ea;
        --shadow: rgba(0, 0, 0, 0.37);
        --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      #root {
        position: relative;
        z-index: 0;
      }
      
      body {
        background-color: #0d1b2a;
        color: var(--text-color);
        font-family: var(--font-family);
        text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        overflow: hidden;
      }

      .background-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        opacity: 0.5;
        filter: blur(120px);
        transition: background-color 3s ease-in-out;
      }

      .color-1 {
        width: 400px;
        height: 400px;
        top: 10vh;
        left: 10vw;
        animation: blobAnimation1 35s infinite;
      }

      .color-2 {
        width: 500px;
        height: 500px;
        top: 60vh;
        left: 70vw;
        animation: blobAnimation2 40s infinite;
        animation-delay: -8s;
      }

      .color-3 {
        width: 350px;
        height: 350px;
        top: 50vh;
        left: 20vw;
        animation: blobAnimation3 32s infinite;
        animation-delay: -16s;
      }

      .color-4 {
        width: 300px;
        height: 300px;
        top: 20vh;
        left: 80vw;
        animation: blobAnimation4 38s infinite;
        animation-delay: -24s;
      }

      @keyframes blobAnimation1 {
        0%   { transform: translate(0, 0) scale(1); background-color: #240046; }
        25%  { transform: translate(20vw, -30vh) scale(1.2); background-color: #134611; }
        50%  { transform: translate(-10vw, 20vh) scale(0.8); background-color: #640202; }
        75%  { transform: translate(30vw, 30vh) scale(1.1); background-color: #0a1128; }
        100% { transform: translate(0, 0) scale(1); background-color: #240046; }
      }

      @keyframes blobAnimation2 {
        0%   { transform: translate(0, 0) scale(1); background-color: #134611; }
        25%  { transform: translate(-30vw, 20vh) scale(1.3); background-color: #640202; }
        50%  { transform: translate(20vw, -25vh) scale(1); background-color: #0a1128; }
        75%  { transform: translate(-10vw, -10vh) scale(0.9); background-color: #240046; }
        100% { transform: translate(0, 0) scale(1); background-color: #134611; }
      }
      
      @keyframes blobAnimation3 {
        0%   { transform: translate(0, 0) scale(1); background-color: #640202; }
        25%  { transform: translate(25vw, 35vh) scale(0.8); background-color: #0a1128; }
        50%  { transform: translate(-25vw, -15vh) scale(1.2); background-color: #240046; }
        75%  { transform: translate(15vw, -20vh) scale(1); background-color: #134611; }
        100% { transform: translate(0, 0) scale(1); background-color: #640202; }
      }

      @keyframes blobAnimation4 {
        0%   { transform: translate(0, 0) scale(1); background-color: #0a1128; }
        25%  { transform: translate(-20vw, -20vh) scale(1.2); background-color: #240046; }
        50%  { transform: translate(30vw, 10vh) scale(0.9); background-color: #134611; }
        75%  { transform: translate(-15vw, 25vh) scale(1.1); background-color: #640202; }
        100% { transform: translate(0, 0) scale(1); background-color: #0a1128; }
      }
      
      .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 var(--shadow);
        position: relative;
        overflow: hidden;
        transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
      }
      .glass-panel:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }
      .glass-panel::after {
        content: "";
        position: absolute;
        top: 0;
        left: -200%;
        width: 150%;
        height: 100%;
        background: linear-gradient( to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0) 100% );
        transform: skewX(-25deg);
        transition: left 0.7s ease-in-out;
        pointer-events: none;
        z-index: 1;
      }
      .glass-panel > * { /* ensure content is above shine */
        position: relative;
        z-index: 2;
      }
      .glass-panel:hover::after {
        left: 150%;
      }
      
      .glass-input {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-color);
        border-radius: 8px;
        transition: box-shadow 0.2s ease-in-out, border-color 0.2s ease-in-out;
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }
      .glass-input:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 10px rgba(0, 242, 234, 0.3);
      }
      
      .glass-button {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-color);
        transition: all 0.2s ease-in-out;
        border-radius: 8px;
        position: relative;
        overflow: hidden;
      }
      .glass-button:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }
      .glass-button:active, .glass-button-active {
        background: rgba(255, 255, 255, 0.05);
        transform: translateY(0px) scale(0.98);
        box-shadow: none;
      }
      .glass-button::after {
        content: "";
        position: absolute;
        top: 0;
        left: -150%;
        width: 100%;
        height: 100%;
        background: linear-gradient( to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(255, 255, 255, 0) 100% );
        transform: skewX(-25deg);
        transition: left 0.6s ease-in-out;
        pointer-events: none;
      }
      .glass-button:hover::after {
        left: 150%;
      }
      
      .glass-button.primary {
        background: rgba(0, 242, 234, 0.15);
        border: 1px solid rgba(0, 242, 234, 0.3);
        font-weight: 600;
      }
      .glass-button.primary:hover {
        background: rgba(0, 242, 234, 0.25);
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(0, 242, 234, 0.4);
      }
      .glass-button.primary:active {
        background: rgba(0, 242, 234, 0.1);
        transform: translateY(0px) scale(0.98);
        box-shadow: none;
      }
      
      .mermaid-diagram-bg {
        background-color: rgba(0,0,0,0.2);
      }
      .code-block-bg {
         background-color: rgba(0,0,0,0.3);
      }
      .pdf-slide {
        background-color: #1a202c;
      }
      /* Ensure html2canvas captures a solid background for PDFs */
      .html2canvas-container {
        background-color: #111827 !important;
      }

      /* Animations for Cinematic UX */
      @keyframes slowFadeIn {
        from { opacity: 0; transform: translateY(20px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes quickFadeOut {
          from { opacity: 1; transform: translateY(0) scale(1); }
          to { opacity: 0; transform: translateY(-10px) scale(0.98); }
      }

      .animate-fade-in {
        animation: slowFadeIn 1s ease-out forwards;
      }
      
      .animate-quick-fade-out {
          animation: quickFadeOut 0.5s ease-in forwards;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.1/",
    "react": "https://esm.sh/react@^19.1.1",
    "react-dom/": "https://esm.sh/react-dom@^19.1.1/",
    "@google/genai": "https://esm.sh/@google/genai@^1.15.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="background-container">
        <div class="blob color-1"></div>
        <div class="blob color-2"></div>
        <div class="blob color-3"></div>
        <div class="blob color-4"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
